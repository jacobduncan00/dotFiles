# Shadow
shadow = false;
shadow-radius = 5;
offset-x = -5;
offset-y = -5;
shadow-opacity = 0.5;
no-dnd-shadow = true;
no-dock-shadow = true;
clear-shadow = true;

blur-background = true;
blur-background-frame = true;
blur-kern = "5x5gaussian";

shadow-red = 0;
shadow-green = 0;
shadow-blue = 0;

inactive-opacity = 0.92;
active-opacity = 0.92;

fading = true;
fade-delta = 6;
fade-in-step = 0.02;
fade-out-step = 0.02;

backend = "glx";
mark-wmwin-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
vsync = "opengl";
sw-opti = true;
unredir-if-possible = true;
dbe = false;

unredir-if-possible-exclude = [ 
	"class_g = 'brave'",
];

detect-client-leader = true;
use-damage = true;

rounded-corners-exclude = [
    "class_g = 'brave'",
    "class_g = 'dmenu'"
];


#shadow = false;
#corner-radius = 20.0;
#round-borders = 0;
#detect-rounded-corners = true;
#shadow-radius = 7;
#shadow-offset-x = -7;
#shadow-offset-y = -7;
#shadow-opacity = 0.3;
#shadow-ignore-shaped = false;
#shadow-exclude = [ "name = 'Notification'", "override_redirect = 1 && !WM_CLASS@:s", "class_g ?= 'Dmenu'", "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'", "_GTK_FRAME_EXTENTS@:c", "class_g ?= 'i3-frame'", "class_g ?= 'trayer'" ];
#inactive-opacity = 1;
#active-opacity = 1;
#inactive-dim = 0.0;
#blur-background = false;
#blur-kern = "3x3box";
#fading = true;
## fade-delta = 1;
#fade-in-step = 0.03;
#fade-out-step = 0.03;
#fade-exclude = [ ];
#backend = "xrender";
#mark-wmwin-focused = true;
#mark-ovredir-focused = true;
#detect-client-opacity = true;
#unredir-if-possible = true;
#refresh-rate = 0;
#vsync = true;
#dbe = false;
#focus-exclude = [ "class_g = 'Cairo-clock'" ];
#detect-transient = true;
#detect-client-leader = true;
#invert-color-include = [ ];
#glx-no-stencil = true;
#glx-no-rebind-pixmap = true;
#use-damage = "true";
opacity-rule = [
"100:class_g *?= 'brave'",
"100:class_g *?= 'mysql-workbench'",
"100:class_g *?= 'MongoDB Compass'",
"100:class_g *?= 'dmenu'",
"100:class_g *?= 'zoom'",
"95:class_g = 'XTerm' && !_NET_WM_STATE@:32a", 
"100:class_g = 'URxvt' && !_NET_WM_STATE@:32a", 
"0:_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'", 
"96:_NET_WM_STATE@:32a *= '_NET_WM_STATE_STICKY'" ];
#wintypes : 
